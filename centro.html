<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mesas de centro - Diseño Industrial 593</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f4f4f4;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(31,41,55,0.9);
  backdrop-filter:blur(10px);
  padding:15px 40px;
  position:sticky;
  top:0;
  z-index:1000;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.logo{
  color:white;
  font-size:28px;
  font-weight:bold;
  letter-spacing:2px;
}

.menu a{
  color:white;
  margin:0 15px;
  text-decoration:none;
  font-weight:500;
  transition:0.3s;
}

.menu a:hover{
  color:#25D366;
}

.menu a::after{
  content:"";
  position:absolute;
  width:0;
  height:2px;
  background:white;
  left:0;
  bottom:-5px;
  transition:0.3s;
}

.section{
  padding:40px 20px;
  text-align:center;
}


.categorias{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
  padding:40px 20px;
}

.categoria{
  width:220px;
  height:300px;
  border-radius:15px;
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:flex-end;
  color:white;
  cursor:pointer;
  transition:transform 0.3s;
}

.categoria:hover{
  transform:scale(1.05);
}

.categoria::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  top:0;
  left:0;
}

.categoria-texto{
  position:relative;
  padding:20px;
  z-index:2;
  text-align:left;
}

.productos{
  display:flex;
  flex-wrap:wrap;             
  justify-content:center;      
  gap:20px;
  padding:20px;
}

.producto{
  background:white;
  width:260px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  transition:0.3s;
}

.producto:hover{
  transform:translateY(-8px);
  box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.producto img{
  width:100%;
  height:200px;
  object-fit:contain;
  background:#f9fafb;
  border-radius:10px;
  padding:10px;
  box-sizing: border-box;
}

.whatsapp{
  display:inline-block;
  margin-top:10px;
  padding:10px 15px;
  background:#25D366;
  color:white;
  text-decoration:none;
  border-radius:5px;
  font-weight:bold;
}

footer{
  background:#2c3e50;
  color:white;
  text-align:center;
  padding:20px;
}

#nosotros p{
  max-width:800px;
  margin:15px auto;
  line-height:1.6;
}


.hero{
  height:500px;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  transition:background-image 1s ease-in-out;
}

.hero-texto{
  background:rgba(0,0,0,0.5);
  padding:30px;
  border-radius:10px;
}

.hero h2{
  font-size:36px;
  margin-bottom:15px;
}

.boton-hero{
  display:inline-block;
  margin-top:15px;
  padding:12px 20px;
  background:#25D366;
  color:white;
  text-decoration:none;
  border-radius:5px;
  font-weight:bold;
}

.slider-container{
  position:relative;
  overflow:hidden;
}

.slider{
  display:flex;
  transition: transform 0.5s ease-in-out;
}

.slider img{
  width:100%;
  flex-shrink:0;
}


.btn { 
  position:absolute; 
  top:50%; 
  transform:translateY(-50%); 
  background:rgba(0,0,0,0.5); 
  color:white; border:none; 
  padding:10px; 
  cursor:pointer; 
  font-size:18px; 
  border-radius:50%; 
} 

.prev { 
  left:10px; 
} 

.next { 
  right:10px; 
} 
  
.btn:hover { 
  background:rgba(0,0,0,0.8); 
} 

html { 
  scroll-behavior: smooth; 
}


#visor{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2000;
  overflow:hidden; 
}


#visor .slider{
  display:flex;
  transition: transform 0.5s ease-in-out;
}
  

#visor img{
  width:100%;
  height:80vh; 
  object-fit:contain;
  flex-shrink:0;
  border-radius:10px;
}


.visor-contenedor{
  width:90%;
  max-width:700px;
  overflow:hidden;
}



@media (max-width: 768px){

  .productos{
    flex-direction: column; 
    align-items: center;
  }

  .producto{
    width:90%;
  }

}

@media (max-width: 768px){

  .header{
    flex-direction: column;
    padding:10px;
  }

  .menu{
    margin-top:10px;
  }

  .menu a{
    display:inline-block;
    margin:5px;
    font-size:14px;
  }

}

@media (max-width: 768px){

  .hero{
    height:350px;
    padding:20px;
  }

  .hero h2{
    font-size:22px;
  }

  .hero p{
    font-size:14px;
  }

}

@media (max-width: 768px){

  .categoria{
    width:45%;
    height:180px;
  }

}
</style>
</head>

<script>
const sliders = {};

function moverSlide(id, direccion){
  const slider = document.getElementById(id);
  const total = slider.children.length;

  if(!sliders[id]){
    sliders[id] = 0;
  }

  sliders[id] += direccion;

  if(sliders[id] < 0){
    sliders[id] = total - 1;
  }

  if(sliders[id] >= total){
    sliders[id] = 0;
  }

  slider.style.transform = `translateX(-${sliders[id] * 100}%)`;
}
  
</script>

  

<script>
function abrirVisor(imgElement){
  const slider = imgElement.parentElement;
  const visorSlider = document.getElementById("visorSlider");

  visorSlider.innerHTML = slider.innerHTML;

  const imgs = slider.children;
  let index = 0;

  for(let i = 0; i < imgs.length; i++){
    if(imgs[i] === imgElement){
      index = i;
      break;
    }
  }

  sliders["visorSlider"] = index; 

  visorSlider.style.transform = `translateX(-${index * 100}%)`;

  document.getElementById("visor").style.display = "flex";
}

  
function cerrarVisor(){
  document.getElementById("visor").style.display = "none";
}
</script> 

  
<body>

<header class="header">
  <div class="logo">DISEÑO INDUSTRIAL 593</div>

  <nav class="menu">
    <a href="index.html">Inicio</a>
    <a href="index.html#categorias">Categorías</a>
    <a href="index.html#ubicacion">Ubicación</a>
    <a href="index.html#contacto">Contacto</a>
  </nav>
</header>

<!-- MESAS DE CENTRO -->
<section id="centro" class="section tab-content">
  <h2>Mesas de centro</h2>

  <div class="productos">

    <div class="producto">
      <img src="img/zynk.jpeg" onclick="abrirVisor(this)">
      <h3>ZYNK</h3>
      <p>$60</p>
    </div>
  </div>
</section>

<!-- PIE DE PAGINA -->
<footer>
  <p>© 2026 Diseño Industrial 593</p>
</footer>


<div id="visor" onclick="cerrarVisor()">

  <button class="btn prev" onclick="event.stopPropagation(); moverSlide('visorSlider', -1)">❮</button>

  
  <div class="visor-contenedor">
    <div class="slider" id="visorSlider"></div>
  </div>

  <button class="btn next" onclick="event.stopPropagation(); moverSlide('visorSlider', 1)">❯</button>

  <button onclick="cerrarVisor()" 
  style="position:absolute; top:20px; right:20px; font-size:30px; background:none; color:white; border:none; cursor:pointer;">
  ✕
  </button>

</div>

</body>
</html>
